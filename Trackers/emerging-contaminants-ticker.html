<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Emerging Contaminants — Federal Register &amp; Legal Ticker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --integral-navy: #133259;
    --integral-lime: #94d343;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'IBM Plex Sans', system-ui, sans-serif;
    background: transparent;
    padding: 12px;
  }
  .fr-ticker {
    background: linear-gradient(135deg, var(--integral-navy) 0%, #1a4070 100%);
    color: #fff;
    border-radius: 8px;
    padding: 14px 18px;
    box-shadow: 0 4px 14px rgba(19,50,89,0.18);
    position: relative;
    overflow: hidden;
    max-width: 760px;
    margin: 0 auto;
  }
  .fr-ticker::before {
    content: "";
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 4px; background: var(--integral-lime);
  }
  .ticker-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px; padding-bottom: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.12);
  }
  .ticker-status {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: rgba(255,255,255,0.85);
  }
  .ticker-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #08FF08;
    box-shadow: 0 0 8px rgba(8,255,8,0.7);
    animation: tickerPulse 1.4s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes tickerPulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:0.4; transform:scale(0.85); }
  }
  .ticker-nav { display: flex; align-items: center; gap: 8px; }
  .ticker-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.85);
    width: 26px; height: 26px; border-radius: 4px;
    cursor: pointer; font-size: 16px; line-height: 1;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 0.15s; padding: 0;
  }
  .ticker-btn:hover { background: rgba(255,255,255,0.16); }
  .ticker-dots { display: inline-flex; gap: 5px; padding: 0 6px; }
  .ticker-dot-nav {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(255,255,255,0.25);
    cursor: pointer; transition: background 0.15s;
  }
  .ticker-dot-nav.is-active { background: var(--integral-lime); }
  .ticker-body { min-height: 108px; }
  .ticker-card { animation: tickerFade 0.4s ease-out; }
  @keyframes tickerFade {
    from { opacity:0; transform:translateY(4px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .ticker-title {
    display: block; color: #fff;
    font-family: 'Georgia','Lora',serif;
    font-size: 15px; font-weight: 600; line-height: 1.35;
    text-decoration: none; margin-bottom: 6px;
  }
  .ticker-title:hover { color: var(--integral-lime); text-decoration: underline; }
  .ticker-meta {
    display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
    margin-bottom: 6px; font-size: 11.5px; color: rgba(255,255,255,0.7);
  }
  .badge-src-fr {
    padding: 1px 7px; font-size: 10px; border-radius: 3px; font-weight: 600;
    background: rgba(148,211,67,0.18); color: var(--integral-lime);
    border: 1px solid rgba(148,211,67,0.4);
  }
  .badge-src-legal {
    padding: 1px 7px; font-size: 10px; border-radius: 3px; font-weight: 600;
    background: rgba(180,200,255,0.14); color: #b4c8ff;
    border: 1px solid rgba(180,200,255,0.35);
  }
  .badge-type {
    background: rgba(148,211,67,0.15); color: var(--integral-lime);
    border: 1px solid rgba(148,211,67,0.3);
    padding: 1px 7px; font-size: 10px; border-radius: 3px;
  }
  .badge-tag {
    background: rgba(255,200,100,0.13); color: #ffc870;
    border: 1px solid rgba(255,200,100,0.3);
    padding: 1px 7px; font-size: 10px; border-radius: 3px;
  }
  .badge-agency {
    background: rgba(200,200,255,0.10); color: rgba(200,210,255,0.8);
    border: 1px solid rgba(200,200,255,0.2);
    padding: 1px 7px; font-size: 10px; border-radius: 3px;
  }
  .ticker-date { font-weight: 500; }
  .ticker-abstract { font-size: 12.5px; line-height: 1.5; color: rgba(255,255,255,0.85); }
  .ticker-loading, .ticker-empty {
    font-size: 12.5px; color: rgba(255,255,255,0.7); padding: 12px 0;
  }
  .ticker-footer {
    margin-top: 10px; padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.10);
    font-size: 10.5px; color: rgba(255,255,255,0.55);
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 4px;
  }
  .ticker-footer a { color: rgba(255,255,255,0.7); text-decoration: none; }
  .ticker-footer a:hover { color: var(--integral-lime); }
</style>
</head>
<body>

<div class="fr-ticker" id="frTicker">
  <div class="ticker-header">
    <div class="ticker-status">
      <span class="ticker-dot"></span>
      <span id="tickerStatusLabel">Loading&hellip;</span>
    </div>
    <div class="ticker-nav">
      <button class="ticker-btn" data-dir="prev" type="button" aria-label="Previous">&#8249;</button>
      <span class="ticker-dots" id="tickerDots"></span>
      <button class="ticker-btn" data-dir="next" type="button" aria-label="Next">&#8250;</button>
    </div>
  </div>
  <div class="ticker-body" id="tickerBody">
    <div class="ticker-loading">Loading emerging contaminant activity&hellip;</div>
  </div>
  <div class="ticker-footer">
    <span id="tickerAge"></span>
    <span>
      
      
      <a href="https://www.jdsupra.com/law-news/environmental-law/" target="_blank" rel="noopener">JD Supra Environmental Law &rarr;</a>
    </span>
  </div>
</div>

<script>
(function () {
  var MAX_DISPLAY = 8;
  var ROTATE_MS   = 8000;
  var DATA_URL    = 'https://ellehart98116.github.io/Trackers/Trackers/emerging-contaminants-data.json';

  var ticker      = document.getElementById('frTicker');
  var bodyEl      = document.getElementById('tickerBody');
  var dotsEl      = document.getElementById('tickerDots');
  var statusLabel = document.getElementById('tickerStatusLabel');
  var ageLabel    = document.getElementById('tickerAge');

  var items       = [];
  var current     = 0;
  var rotateTimer = null;

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
    });
  }
  function fmtDate(s) {
    if (!s) return '';
    var d = new Date(s);
    return isNaN(d) ? s : d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  }
  function timeAgo(isoStr) {
    if (!isoStr) return '';
    var diff = Date.now() - new Date(isoStr).getTime();
    var h = Math.round(diff / 36e5);
    if (h < 1)  return 'Updated just now';
    if (h < 24) return 'Updated ' + h + 'h ago';
    var d = Math.round(h / 24);
    return 'Updated ' + d + (d === 1 ? ' day' : ' days') + ' ago';
  }
  function sourceBadge(item) {
    if (item.sourceType === 'legal') {
      var label = (item.source || '').replace(/\s*\u2014.*$/, '').trim();
      return '<span class="badge-src-legal">' + esc(label) + '</span>';
    }
    return '<span class="badge-src-legal">' + esc(item.source || 'JD Supra') + '</span>';
  }

  function renderDots() {
    var html = '';
    for (var i = 0; i < items.length; i++) {
      html += '<span class="ticker-dot-nav' + (i === current ? ' is-active' : '') +
              '" data-idx="' + i + '"></span>';
    }
    dotsEl.innerHTML = html;
    dotsEl.querySelectorAll('.ticker-dot-nav').forEach(function (d) {
      d.addEventListener('click', function () {
        current = parseInt(d.dataset.idx, 10);
        renderCurrent();
        restartRotation();
      });
    });
  }

  function renderCurrent() {
    if (!items.length) return;
    var item = items[current];
    var abstract = item.abstract || '';
    if (abstract.length >= 280) abstract += '…';
    var agencyText = item.agency ? item.agency.split(',')[0].trim() : '';
    var agencyBadge = agencyText ? '<span class="badge-agency">' + esc(agencyText) + '</span>' : '';

    bodyEl.innerHTML =
      '<div class="ticker-card">' +
        '<a class="ticker-title" href="' + esc(item.url) + '" target="_blank" rel="noopener">' + esc(item.title) + '</a>' +
        '<div class="ticker-meta">' +
          sourceBadge(item) +
          (item.type ? '<span class="badge-type">' + esc(item.type) + '</span>' : '') +
          (item.tag  ? '<span class="badge-tag">'  + esc(item.tag)  + '</span>' : '') +
          agencyBadge +
          '<span class="ticker-date">' + esc(fmtDate(item.date)) + '</span>' +
        '</div>' +
        (abstract ? '<div class="ticker-abstract">' + esc(abstract) + '</div>' : '') +
      '</div>';

    renderDots();
  }

  function startRotation() {
    if (items.length <= 1) return;
    rotateTimer = setInterval(function () {
      current = (current + 1) % items.length;
      renderCurrent();
    }, ROTATE_MS);
  }
  function stopRotation()    { if (rotateTimer) { clearInterval(rotateTimer); rotateTimer = null; } }
  function restartRotation() { stopRotation(); startRotation(); }

  ticker.querySelectorAll('.ticker-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      if (!items.length) return;
      current = btn.dataset.dir === 'prev'
        ? (current - 1 + items.length) % items.length
        : (current + 1) % items.length;
      renderCurrent();
      restartRotation();
    });
  });
  ticker.addEventListener('mouseenter', stopRotation);
  ticker.addEventListener('mouseleave', startRotation);

  fetch(DATA_URL)
    .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function (data) {
      var all = data.items || [];

      // Interleave regulatory and legal items so both types appear
      var regulatory = all.filter(function (i) { return i.sourceType === 'regulatory'; });
      var legal      = all.filter(function (i) { return i.sourceType === 'legal'; });
      var interleaved = [];
      var ri = 0, li = 0;
      while (interleaved.length < MAX_DISPLAY && (ri < regulatory.length || li < legal.length)) {
        if (ri < regulatory.length) interleaved.push(regulatory[ri++]);
        if (interleaved.length < MAX_DISPLAY && li < legal.length) interleaved.push(legal[li++]);
      }
      items = interleaved;

      if (!items.length) {
        bodyEl.innerHTML = '<div class="ticker-empty">No results yet — the GitHub Actions workflow may still be running for the first time. Trigger it manually in the Actions tab.</div>';
        statusLabel.textContent = 'No data';
        return;
      }

      var tags = {};
      var hasLegal = false;
      items.forEach(function (it) {
        if (it.tag) tags[it.tag] = true;
        if (it.sourceType === 'legal') hasLegal = true;
      });
      var srcLabel = 'Environmental Law &middot; JD Supra';
      statusLabel.innerHTML = srcLabel + ' &middot; ' + items.length + ' items &middot; ' + Object.keys(tags).length + ' contaminant groups';
      if (data.generated) ageLabel.textContent = timeAgo(data.generated);

      renderCurrent();
      startRotation();
    })
    .catch(function (err) {
      console.error('Feed load error:', err);
      bodyEl.innerHTML = '<div class="ticker-empty">Feed data unavailable. Trigger the GitHub Actions workflow manually to generate the data file.</div>';
      statusLabel.textContent = 'Offline';
    });
})();
</script>

</body>
</html>
