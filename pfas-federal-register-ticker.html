<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PFAS Tracker Ticker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --integral-navy: #133259;
    --integral-navy-deep: #0d2440;
    --integral-lime: #94d343;
    --integral-lime-bright: #c8ec3a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'IBM Plex Sans', system-ui, sans-serif;
    background: transparent;
    color: #1a2733;
    padding: 12px;
  }
  .fr-ticker {
    background: linear-gradient(135deg, var(--integral-navy) 0%, #1a4070 100%);
    color: #fff;
    border-radius: 8px;
    padding: 14px 18px;
    box-shadow: 0 4px 14px rgba(19, 50, 89, 0.18);
    position: relative;
    overflow: hidden;
    max-width: 760px;
    margin: 0 auto;
  }
  .fr-ticker::before {
    content: "";
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 4px; background: var(--integral-lime);
  }
  .ticker-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px; padding-bottom: 8px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.12);
  }
  .ticker-status {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: rgba(255, 255, 255, 0.85);
  }
  .ticker-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #08FF08;
    box-shadow: 0 0 8px rgba(8, 255, 8, 0.7);
    animation: tickerPulse 1.4s ease-in-out infinite;
  }
  @keyframes tickerPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }
  .ticker-nav { display: flex; align-items: center; gap: 8px; }
  .ticker-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.85);
    width: 26px; height: 26px; border-radius: 4px;
    cursor: pointer; font-size: 16px; line-height: 1;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 0.15s; padding: 0;
  }
  .ticker-btn:hover { background: rgba(255,255,255,0.16); }
  .ticker-dots { display: inline-flex; gap: 5px; padding: 0 6px; }
  .ticker-dot-nav {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(255,255,255,0.25);
    cursor: pointer; transition: background 0.15s;
  }
  .ticker-dot-nav.is-active { background: var(--integral-lime); }
  .ticker-body { min-height: 100px; }
  .ticker-card { animation: tickerFade 0.4s ease-out; }
  @keyframes tickerFade {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .ticker-title {
    display: block; color: #fff;
    font-family: 'Georgia', 'Lora', serif;
    font-size: 15px; font-weight: 600; line-height: 1.35;
    text-decoration: none; margin-bottom: 6px;
  }
  .ticker-title:hover { color: var(--integral-lime); text-decoration: underline; }
  .ticker-meta {
    display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
    margin-bottom: 6px; font-size: 11.5px; color: rgba(255,255,255,0.7);
  }
  .ticker-meta .badge {
    background: rgba(148, 211, 67, 0.18);
    color: var(--integral-lime);
    border: 1px solid rgba(148, 211, 67, 0.35);
    padding: 1px 7px; font-size: 10px; border-radius: 3px;
  }
  .ticker-src { padding: 1px 7px; font-size: 10px; border-radius: 3px; font-weight: 600; letter-spacing: 0.02em; }
  .ticker-src.src-fr { background: rgba(148, 211, 67, 0.18); color: var(--integral-lime); border: 1px solid rgba(148, 211, 67, 0.4); }
  .ticker-src.src-jdsupra { background: rgba(180, 200, 255, 0.14); color: #b4c8ff; border: 1px solid rgba(180, 200, 255, 0.35); }
  .ticker-src.src-lexology { background: rgba(255, 200, 100, 0.14); color: #ffc870; border: 1px solid rgba(255, 200, 100, 0.35); }
  .ticker-date { font-weight: 500; }
  .ticker-abstract { font-size: 12.5px; line-height: 1.5; color: rgba(255,255,255,0.85); }
  .ticker-loading, .ticker-empty { font-size: 12.5px; color: rgba(255,255,255,0.7); padding: 12px 0; }
  .ticker-footer {
    margin-top: 10px; padding-top: 8px;
    border-top: 1px solid rgba(255, 255, 255, 0.10);
    font-size: 10.5px; color: rgba(255, 255, 255, 0.55);
    display: flex; justify-content: space-between; align-items: center;
  }
  .ticker-footer a { color: rgba(255, 255, 255, 0.7); text-decoration: none; }
  .ticker-footer a:hover { color: var(--integral-lime); }
</style>
</head>
<body>

<div class="fr-ticker" id="frTicker">
  <div class="ticker-header">
    <div class="ticker-status">
      <span class="ticker-dot"></span>
      <span>Live &middot; loading sources&hellip;</span>
    </div>
    <div class="ticker-nav">
      <button class="ticker-btn" data-dir="prev" type="button" aria-label="Previous item">&#8249;</button>
      <span class="ticker-dots" id="tickerDots"></span>
      <button class="ticker-btn" data-dir="next" type="button" aria-label="Next item">&#8250;</button>
    </div>
  </div>
  <div class="ticker-body" id="tickerBody">
    <div class="ticker-loading">Fetching PFAS activity from Federal Register, JD Supra, and Lexology&hellip;</div>
  </div>
  <div class="ticker-footer">
    <span>Sources interleaved by date &middot; updates on page load</span>
    <a href="https://www.federalregister.gov/documents/search?conditions[term]=PFAS&conditions[agencies][]=environmental-protection-agency" target="_blank" rel="noopener">View FR &rarr;</a>
  </div>
</div>

<script>
(function() {
  var ticker = document.getElementById('frTicker');
  if (!ticker) return;
  var body = document.getElementById('tickerBody');
  var dotsEl = document.getElementById('tickerDots');
  var statusLabel = ticker.querySelector('.ticker-status span:last-child');
  var items = [];
  var current = 0;
  var rotateTimer = null;
  var ROTATE_MS = 6000;
  var FETCH_TIMEOUT_MS = 5000;
  var CORS_PROXY = 'https://api.allorigins.win/get?url=';

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
  function fmtDate(s) {
    if (!s) return '';
    var d = new Date(s);
    if (isNaN(d)) return s;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }
  function stripHtml(s) {
    if (!s) return '';
    var tmp = document.createElement('div');
    tmp.innerHTML = s;
    return (tmp.textContent || tmp.innerText || '').trim();
  }
  function fetchWithTimeout(url, ms) {
    var ctrl = (typeof AbortController !== 'undefined') ? new AbortController() : null;
    var timer = setTimeout(function() { if (ctrl) ctrl.abort(); }, ms);
    var opts = ctrl ? { signal: ctrl.signal } : {};
    return fetch(url, opts).finally(function() { clearTimeout(timer); });
  }

  function fetchFederalRegister() {
    var url = 'https://www.federalregister.gov/api/v1/documents.json?conditions[term]=PFAS&conditions[agencies][]=environmental-protection-agency&per_page=6&order=newest';
    return fetchWithTimeout(url, FETCH_TIMEOUT_MS)
      .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(function(data) {
        return (data.results || []).map(function(r) {
          return { source: 'Federal Register', sourceClass: 'src-fr', title: r.title, url: r.html_url, date: r.publication_date, type: r.type || 'Notice', abstract: (r.abstract || '').substring(0, 220) };
        });
      })
      .catch(function() { return []; });
  }
  function fetchRss(feedUrl, sourceName, sourceClass) {
    return fetchWithTimeout(CORS_PROXY + encodeURIComponent(feedUrl), FETCH_TIMEOUT_MS)
      .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(function(data) {
        if (!data || !data.contents) return [];
        var doc = new DOMParser().parseFromString(data.contents, 'application/xml');
        var rssItems = doc.querySelectorAll('item, entry');
        var out = [];
        rssItems.forEach(function(item) {
          if (out.length >= 6) return;
          var titleEl = item.querySelector('title');
          var linkEl = item.querySelector('link');
          var pubEl = item.querySelector('pubDate, published, updated');
          var descEl = item.querySelector('description, summary, content');
          var link = '';
          if (linkEl) { link = linkEl.getAttribute('href') || linkEl.textContent || ''; }
          var title = stripHtml(titleEl ? titleEl.textContent : '');
          var pub = pubEl ? pubEl.textContent : '';
          var desc = stripHtml(descEl ? descEl.textContent : '');
          if (title && link) {
            out.push({ source: sourceName, sourceClass: sourceClass, title: title, url: link.trim(), date: pub, type: 'Analysis', abstract: desc.substring(0, 220) });
          }
        });
        return out;
      })
      .catch(function() { return []; });
  }

  function renderDots() {
    if (!dotsEl) return;
    var html = '';
    for (var i = 0; i < items.length; i++) {
      html += '<span class="ticker-dot-nav' + (i === current ? ' is-active' : '') + '" data-idx="' + i + '"></span>';
    }
    dotsEl.innerHTML = html;
    dotsEl.querySelectorAll('.ticker-dot-nav').forEach(function(d) {
      d.addEventListener('click', function() { current = parseInt(d.dataset.idx, 10); renderCurrent(); restartRotation(); });
    });
  }
  function renderCurrent() {
    if (!items.length) return;
    var item = items[current];
    var srcBadge = '<span class="ticker-src ' + item.sourceClass + '">' + escapeHtml(item.source) + '</span>';
    var typeBadge = item.type ? '<span class="badge">' + escapeHtml(item.type) + '</span>' : '';
    var date = fmtDate(item.date);
    var abstractText = item.abstract;
    if (item.abstract && item.abstract.length >= 220) abstractText += '…';
    body.innerHTML = '<div class="ticker-card">' +
      '<a class="ticker-title" href="' + escapeHtml(item.url) + '" target="_blank" rel="noopener">' + escapeHtml(item.title) + '</a>' +
      '<div class="ticker-meta">' + srcBadge + typeBadge + '<span class="ticker-date">' + escapeHtml(date) + '</span></div>' +
      (abstractText ? '<div class="ticker-abstract">' + escapeHtml(abstractText) + '</div>' : '') +
      '</div>';
    renderDots();
  }
  function startRotation() {
    if (items.length <= 1) return;
    rotateTimer = setInterval(function() {
      current = (current + 1) % items.length;
      renderCurrent();
    }, ROTATE_MS);
  }
  function stopRotation() { if (rotateTimer) { clearInterval(rotateTimer); rotateTimer = null; } }
  function restartRotation() { stopRotation(); startRotation(); }

  ticker.querySelectorAll('.ticker-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      if (!items.length) return;
      var dir = btn.dataset.dir;
      current = (dir === 'prev') ? (current - 1 + items.length) % items.length : (current + 1) % items.length;
      renderCurrent();
      restartRotation();
    });
  });
  ticker.addEventListener('mouseenter', stopRotation);
  ticker.addEventListener('mouseleave', startRotation);

  Promise.allSettled([
    fetchFederalRegister(),
    fetchRss('https://www.jdsupra.com/topics/pfas/feed/', 'JD Supra', 'src-jdsupra'),
    fetchRss('https://www.lexology.com/feed.aspx?source=hub-topic&id=ecaf48e3-d0e7-4abc-b8bc-3aff4daca12a', 'Lexology', 'src-lexology')
  ]).then(function(settled) {
    var all = [];
    settled.forEach(function(s) { if (s.status === 'fulfilled' && Array.isArray(s.value)) all = all.concat(s.value); });
    var seen = {};
    items = all.filter(function(it) { if (seen[it.url]) return false; seen[it.url] = true; return true; });
    items.sort(function(a, b) {
      var da = new Date(a.date).getTime() || 0;
      var db = new Date(b.date).getTime() || 0;
      return db - da;
    });
    items = items.slice(0, 12);
    if (!items.length) {
      body.innerHTML = '<div class="ticker-empty">All three feeds failed to load. The CORS proxy or RSS endpoints may be blocked on this network.</div>';
      if (statusLabel) statusLabel.innerHTML = 'No sources loaded';
      return;
    }
    var sources = {};
    items.forEach(function(it) { sources[it.source] = true; });
    var srcList = Object.keys(sources).join(' &middot; ');
    if (statusLabel) statusLabel.innerHTML = 'Live &middot; ' + srcList;
    renderCurrent();
    startRotation();
  });
})();
</script>

</body>
</html>
