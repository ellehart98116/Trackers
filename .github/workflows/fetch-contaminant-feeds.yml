name: Fetch Contaminant Feeds

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # allows manual trigger from GitHub Actions tab

jobs:
  fetch-and-write:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit feeds.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch xml2js

      - name: Run feed fetcher
        run: node Trackers/fetch-feeds.js

      - name: Commit and push feeds.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Trackers/emerging-contaminants-data.json
          git diff --cached --quiet || git commit -m "chore: update emerging contaminants feed data [skip ci]"
          git push
